<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/cadastrolivro.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/home.css">
  <title>Cadastro de Livros</title>
</head>
<body>
  <div class="screen">
        <div class="itens_left">
            <p>Insira a Capa do Livro</p>
            <form class="file-upload-form">
                <label for="file" class="file-upload-label">
                  <div class="file-upload-design">
                    <svg viewBox="0 0 640 512" height="1em">
                      <path
                        d="M144 480C64.5 480 0 415.5 0 336c0-62.8 40.2-116.2 96.2-135.9c-.1-2.7-.2-5.4-.2-8.1c0-88.4 71.6-160 160-160c59.3 0 111 32.2 138.7 80.2C409.9 102 428.3 96 448 96c53 0 96 43 96 96c0 12.2-2.3 23.8-6.4 34.6C596 238.4 640 290.1 640 352c0 70.7-57.3 128-128 128H144zm79-217c-9.4 9.4-9.4 24.6 0 33.9s24.6 9.4 33.9 0l39-39V392c0 13.3 10.7 24 24 24s24-10.7 24-24V257.9l39 39c9.4 9.4 24.6 9.4 33.9 0s9.4-24.6 0-33.9l-80-80c-9.4-9.4-24.6-9.4-33.9 0l-80 80z"
                      ></path>
                    </svg>
                    <p>Drag and Drop</p>
                    <p>or</p>
                    <span class="browse-button">Browse file</span>
                  </div>
                  <input id="file" type="file" />
                </label>
              </form>
        </div>      
        <div class="itens_rigth">
            <div class="itens_cadastro">
                <label for="name_livro" class="form-label"> Nome do livro</label><br>
                <input type="name_livro" class="form-control" name="name_livro" id="input_livro"/><br>
                <label for="name_autor" class="form-label"> Autor</label><br>
                <input type="name_autor" class="form-control" name="name_autor" id="input_autor"/><br>
                <label for="name_editora" class="form-label"> Editora</label><br>
                <input type="name_editora" class="form-control" name="name_editora" id="input_editora"/><br>
            </div>
            <div class="selector">
                <label for="genero" class="genero">Gênero</label><br>
            <select class="form-select" aria-label=".form-select-sm" id="seletor">
                <option value="1">Romance</option>
                <option value="2">Suspense</option>
                <option value="3">Terror</option>
                <option value="4">Biografia</option>
                <option value="5">Ação</option>
                <option value="6">Crônicas</option>
                <option value="7">Científico</option>
                <option value="8">Ficção</option>
                <option value="9">Infantil</option>
                <option value="10">Poesia</option>
            </select>
            </div>
            <div class="sinopse">
                <label for="descricao" class="form-label"> Descrição </label><br>
                <input type="descricao" class="form-control" name="descricao" id="input_descricao">
            </div>
            <div class="btn_cadastrar">
                <button>Cadastrar</button>
            </div>
        </div>
    </div>
</body>
</html>
