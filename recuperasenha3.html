<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha</title>
    <link rel="stylesheet" href="css/recuperasenha.css">
</head>


<body>
    <header>
        <div class="center">
            <img src="img/logo.png" >
            <h1>Esqueceu sua Senha?</h1>
        </div>
    </header>
    <form id="recuperar">
        <div class="senha">
            <div class="nova">
                <label for="password">Nova senha:</label>
                <input type="password" name="password" id="inputSenha" required>
            </div>
            <div class="confirmar">
                <label for="password">Confirmar nova senha:</label>
                <input type="password" name="password" id="inputConfirmacao" required>
            </div>
        </div>
        <div class="botao">
            <button><a href="login.html">Enviar</a></button> 
        </div>
    </form>
    
</body>
</html>
