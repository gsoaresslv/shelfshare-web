                <select class="form-select" aria-label="Default select example"> <!-- Criando select para o usuario escolher o genero do livro que deseja pesquisar -->
                    <option value="1" selected>Romance</option> <!-- Criando opções para o usuario escolher -->

                    <option value="3">Terror</option>
